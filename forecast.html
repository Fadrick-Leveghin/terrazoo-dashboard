<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TerraZoo — Forecast 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Calibri:wght@300;400;600&display=swap');
:root {
  --v1:#1a2e1f; --v2:#2E7D32; --v3:#4CAF50; --v4:#A5D6A7; --v5:#b2dfc4; --v6:#E8F5E9;
  --txt:#111; --muted:#555; --borda:#C8E6C9; --fundo:#fff;
  --red:#9C0006; --amber:#FFC000; --green:#2E7D32;
  /* colunas forecast */
  --col-real:#1a2e1f;
  --col-orc:#2E7D32;
  --col-total:#388E3C;
  --col-orig:#558B2F;
  /* row types — idêntico à DRE */
  --row-total:#1a2e1f;       --row-total-txt:#fff;
  --row-subtotal:#2E7D32;    --row-subtotal-txt:#fff;
  --row-grupo:#E8F5E9;       --row-grupo-txt:#1a2e1f;
  --row-highlight:#b2dfc4;   --row-highlight-txt:#1a2e1f;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Calibri','Segoe UI',sans-serif;background:var(--fundo);color:var(--txt);min-height:100vh;font-size:13px}

/* HEADER */
header{background:var(--v1);height:64px;padding:0 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.logo{font-size:22px;font-weight:600;color:#fff}.logo span{color:var(--v4)}
.header-right{display:flex;align-items:center;gap:12px}
.btn-back{font-size:12px;color:var(--v4);background:none;border:1px solid rgba(165,214,167,.3);padding:5px 12px;border-radius:6px;cursor:pointer;font-family:inherit;text-decoration:none;transition:all .2s}
.btn-back:hover{background:rgba(165,214,167,.1)}
.btn-export{font-size:12px;color:#fff;background:var(--v2);border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-family:inherit;font-weight:600;transition:background .2s}
.btn-export:hover{background:var(--v3);color:var(--v1)}

/* LOADING */
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px}
.spinner{width:36px;height:36px;border:3px solid var(--borda);border-top-color:var(--v2);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ERROR */
#error-box{display:none;max-width:500px;margin:80px auto;padding:32px;background:#fff3f3;border:1px solid #ffcdd2;border-radius:12px;text-align:center}
.error-title{font-size:18px;font-weight:600;color:var(--red);margin-bottom:8px}
.error-msg{font-size:13px;color:#666;line-height:1.6}

/* MAIN */
main{max-width:1400px;margin:0 auto;padding:24px 20px 60px}

/* FILTROS */
.filtros-bar{background:#fff;border:1px solid var(--borda);border-radius:10px;padding:14px 20px;margin-bottom:20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.filtro-group{display:flex;align-items:center;gap:8px}
.filtro-label{font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);white-space:nowrap}
select{background:var(--v6);border:1px solid var(--borda);color:var(--txt);font-size:12px;padding:6px 10px;border-radius:7px;font-family:inherit;cursor:pointer;transition:border-color .2s}
select:focus{outline:none;border-color:var(--v3)}
.filtro-sep{width:1px;height:28px;background:var(--borda)}

/* PAGE HEADER */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.page-title{font-size:22px;font-weight:600;color:var(--v1)}
.page-sub{font-size:12px;color:var(--muted);margin-top:3px}
.badge{background:var(--v5);color:var(--v1);font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;letter-spacing:.5px;white-space:nowrap}

/* KPI CARDS */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi{background:#fff;border:1px solid var(--borda);border-radius:10px;padding:16px 14px;border-left:4px solid var(--v2)}
.kpi-label{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--v2);margin-bottom:6px}
.kpi-value{font-size:22px;font-weight:600;color:var(--v1);letter-spacing:-0.5px;line-height:1.1}
.kpi-sub{font-size:11px;margin-top:5px;color:var(--muted)}
.kpi-up{color:var(--green)!important;font-weight:600}
.kpi-dn{color:var(--red)!important;font-weight:600}

/* TABLE WRAP */
.tbl-wrap{overflow-x:auto;border:1px solid var(--borda);border-radius:10px;background:#fff;margin-bottom:20px}
.tbl-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--borda);background:#fff}
.tbl-title{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--v2)}
.tbl-legend{display:flex;align-items:center;gap:14px;font-size:11px;color:var(--muted)}
.leg{display:flex;align-items:center;gap:5px}
.leg-dot{width:10px;height:10px;border-radius:2px}

/* TABLE */
.tbl-outer{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:900px;table-layout:fixed}

/* HEADER GROUPS — idêntico à DRE */
thead tr.gr1 th{background:var(--v1);color:#fff;font-weight:600;font-size:11px;letter-spacing:.8px;text-transform:uppercase;padding:10px 8px;text-align:center;border-right:1px solid rgba(255,255,255,.1);white-space:nowrap}
thead tr.gr2 th{background:#263a2b;color:rgba(255,255,255,.75);font-size:10px;font-weight:500;padding:6px 8px;text-align:right;border-right:1px solid rgba(255,255,255,.08);white-space:nowrap}
thead tr.gr1 th:first-child,thead tr.gr2 th:first-child{text-align:left;padding-left:14px;min-width:220px}

/* cada grupo de coluna herda cor no gr1 E gr2 */
th.th-dre  {background:var(--v1)}
th.th-real {background:var(--col-real)}
th.th-orc  {background:var(--col-orc)}
th.th-total{background:var(--col-total)}
th.th-orig {background:var(--col-orig)}

/* BODY ROWS */
tbody tr{border-bottom:1px solid #f0f5f0;transition:filter .1s}
tbody tr:hover{filter:brightness(.96)}

td{padding:5px 8px;text-align:right;white-space:nowrap;border-right:1px solid #f0f5f0}
td:first-child{text-align:left;padding-left:14px;border-right:1px solid #e0ebe0;min-width:220px}
.sep-r{border-right:2px solid rgba(0,0,0,.06)!important}

/* fundo leve colunas */
.bg-real {background:rgba(26,46,31,.03)}
.bg-orc  {background:rgba(46,125,50,.03)}
.bg-total{background:rgba(56,142,60,.05)}
.bg-orig {background:rgba(85,139,47,.04)}

/* valores */
.neg{color:var(--red)!important}
.av{color:var(--muted);font-size:11px}
.ah-pos{color:var(--green);font-weight:600}
.ah-neg{color:var(--red);font-weight:600}
.ah-nt{color:var(--muted)}

/* ROW TYPES — idêntico à DRE */
tr.row-total     td{background:var(--row-total)!important;    color:var(--row-total-txt)!important;    font-weight:700;font-size:12px}
tr.row-subtotal  td{background:var(--row-subtotal)!important; color:var(--row-subtotal-txt)!important; font-weight:600}
tr.row-highlight td{background:var(--row-highlight)!important;color:var(--row-highlight-txt)!important;font-weight:600}
tr.row-group     td{background:var(--row-grupo);color:var(--row-grupo-txt);font-weight:500}
tr.row-total    td.ah-pos,tr.row-total    td.ah-neg{color:#fff!important}
tr.row-subtotal td.ah-pos,tr.row-subtotal td.ah-neg{color:#fff!important}

/* FOOTER */
footer{background:var(--v1);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;margin-top:40px}
.footer-logo{font-size:13px;font-weight:600;color:rgba(255,255,255,.4)}.footer-logo span{color:var(--v4)}
.footer-info{font-size:11px;color:rgba(255,255,255,.25);letter-spacing:1px}
@media(max-width:700px){.kpis{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<header>
  <div class="logo">terra<span>ZOO</span></div>
  <div class="header-right">
    <span style="font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.4)">Forecast 2026</span>
    <button class="btn-export" onclick="exportarCSV()">⬇ Exportar</button>
    <a class="btn-back" href="index.html">← Voltar</a>
  </div>
</header>

<div id="loading"><div class="spinner"></div><div style="font-size:14px;color:var(--muted)">Carregando dados...</div></div>
<div id="error-box"><div class="error-title">Erro</div><div class="error-msg" id="error-msg"></div></div>

<main id="main-content" style="display:none">

  <div class="filtros-bar">
    <span class="filtro-label">Visão</span>
    <select id="fVisao" onchange="onVisaoChange()">
      <option value="consolidado">Consolidado</option>
      <option value="regiao">Por Região</option>
      <option value="loja">Por Loja</option>
    </select>
    <div id="grpRegiao" style="display:none;align-items:center;gap:8px">
      <span class="filtro-label">Região</span>
      <select id="fRegiao" onchange="renderForecast()"></select>
    </div>
    <div id="grpLoja" style="display:none;align-items:center;gap:8px">
      <span class="filtro-label">Loja</span>
      <select id="fLoja" onchange="renderForecast()"></select>
    </div>
  </div>

  <div class="page-header">
    <div>
      <div class="page-title">Forecast 2026</div>
      <div class="page-sub" id="page-sub"></div>
    </div>
    <div class="badge" id="badge-periodo"></div>
  </div>

  <div class="kpis" id="kpi-area" style="grid-template-columns:repeat(5,1fr)"></div>

  <div class="tbl-wrap">
    <div class="tbl-header">
      <div class="tbl-title">DRE Forecast Anual 2026</div>
    </div>
    <div class="tbl-outer">
      <table id="tbl-forecast">
        <thead id="thead-forecast"></thead>
        <tbody id="tbody-forecast"></tbody>
      </table>
    </div>
  </div>
  <div class="tbl-wrap" style="margin-top:28px">
    <div class="tbl-header">
      <div class="tbl-title">Forecast Ajustado 2026 — Tendência por Linha</div>
    </div>
    <div class="kpis" id="kpi-ajustado" style="padding:16px 16px 0;grid-template-columns:repeat(5,1fr)"></div>
    <div class="tbl-outer">
      <table id="tbl-ajustado">
        <thead id="thead-ajustado"></thead>
        <tbody id="tbody-ajustado"></tbody>
      </table>
    </div>
  </div>

</main>

<footer>
  <div class="footer-logo">terra<span>ZOO</span></div>
  <div class="footer-info">FORECAST 2026 · TERRAZOO</div>
</footer>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbwbqZDvHDwuwWJkyyjgK3YJAi7JEBqLHAlbuJHh32V50FyFSTneJEmmRWrpW49Rw5by/exec?tipo=forecast';
let DADOS = [], REGIOES = {};
const NOM = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const MESES_ANO = ['01','02','03','04','05','06','07','08','09','10','11','12'];

const LINHAS = [
  { linha:'Receita Bruta',                        cls:'row-subtotal', sinal:1  },
  { linha:'Receita com Revenda de Mercadorias',   cls:'row-group',    sinal:1  },
  { linha:'Receita com Serviços',                 cls:'row-group',    sinal:1  },
  { linha:'Ajuste Intercompany',                  cls:'row-group',    sinal:-1 },
  { linha:'Impostos S/ Vendas',                   cls:'row-group',    sinal:-1 },
  { linha:'Receita Líquida',                      cls:'row-total',    sinal:1  },
  { linha:'CMV & CSP',                            cls:'row-group',    sinal:-1 },
  { linha:'Custo das Mercadorias Vendidas',       cls:'row-group',    sinal:-1 },
  { linha:'Ajuste Custo Intercompany',            cls:'row-group',    sinal:-1 },
  { linha:'Custo dos Serviços Prestados',         cls:'row-group',    sinal:-1 },
  { linha:'Lucro Bruto',                          cls:'row-highlight',sinal:1  },
  { linha:'Verbas Comerciais',                    cls:'row-group',    sinal:-1 },
  { linha:'Lucro Bruto Ajustado',                 cls:'row-highlight',sinal:1  },
  { linha:'SG&A',                                 cls:'row-subtotal', sinal:-1 },
  { linha:'Comissões sobre Vendas',               cls:'row-group',    sinal:-1 },
  { linha:'Gastos com Pessoal Comercial',         cls:'row-group',    sinal:-1 },
  { linha:'Gastos com Pessoal - SG&A',            cls:'row-group',    sinal:-1 },
  { linha:'Despesas Comerciais',                  cls:'row-group',    sinal:-1 },
  { linha:'Despesas com Distribuição',            cls:'row-group',    sinal:-1 },
  { linha:'Despesas Administrativas',             cls:'row-group',    sinal:-1 },
  { linha:'Despesas Tributárias',                 cls:'row-group',    sinal:-1 },
  { linha:'Aluguel',                              cls:'row-group',    sinal:-1 },
  { linha:'Outras Receitas/Despesas Operacionais',cls:'row-group',    sinal:1  },
  { linha:'EBITDA',                               cls:'row-total',    sinal:1  },
  { linha:'Resultados Não Recorentes',            cls:'row-group',    sinal:1  },
  { linha:'EBITDA Ajustado',                      cls:'row-total',    sinal:1  },
];

// ── Helpers ──
function fmtN(v){ return Math.round(Math.abs(v)).toLocaleString('pt-BR'); }
function fmtM(v){
  const a=Math.abs(v);
  const s=a>=1e6?'R$ '+(a/1e6).toFixed(2).replace('.',',')+'M':
          a>=1e3?'R$ '+(a/1e3).toFixed(0)+'K':'R$ '+Math.round(a).toLocaleString('pt-BR');
  return v<0?`(${s})`:s;
}
function fmtAV(v, base){ return base ? (v/base*100).toFixed(1).replace('.',',')+' %' : '-'; }
function fmtAH(v, base){
  if (!base || base===0) return {txt:'-', cls:'ah-nt'};
  const pct = (v-base)/Math.abs(base)*100;
  const txt = (pct>=0?'+':'')+pct.toFixed(1).replace('.',',')+' %';
  return {txt, cls: pct>0?'ah-pos':pct<0?'ah-neg':'ah-nt'};
}
function fmtMes(s){ const p=s.split('-'); return NOM[parseInt(p[1])-1]+'/'+p[0].slice(2); }

function filtrar(rows){
  const visao=document.getElementById('fVisao').value;
  if(visao==='regiao') return rows.filter(r=>REGIOES[r.loja]===document.getElementById('fRegiao').value);
  if(visao==='loja')   return rows.filter(r=>r.loja===document.getElementById('fLoja').value);
  return rows;
}

function somaReal(rows, linha, meses){
  return rows.filter(r=>r.linha_dre===linha && r.mes_ano.startsWith('2026') && meses.includes(r.mes_ano.slice(5,7)))
    .reduce((s,r)=>s+r.realizado/100,0);
}
function somaOrc(rows, linha, meses){
  return rows.filter(r=>r.linha_dre===linha && r.mes_ano.startsWith('2026') && meses.includes(r.mes_ano.slice(5,7)))
    .reduce((s,r)=>s+r.orcado/100,0);
}

// ── Init ──
async function init(){
  try{
    const resp=await fetch(API_URL);
    const data=await resp.json();
    if(data.status!=='ok') throw new Error(data.message);
    REGIOES=data.regioes||{};
    DADOS=(data.rows||[]).map(r=>({
      mes_ano:   String(r.mes_ano||'').replace(/[^0-9\-]/g,'').slice(0,7),
      loja:      String(r.loja||''),
      linha_dre: String(r.linha_dre||'').trim(),
      realizado: Number(r.realizado||0),
      orcado:    Number(r.orcado||0),
    }));
    const lojas=[...new Set(DADOS.map(r=>r.loja))].sort();
    const grupos=[...new Set(Object.values(REGIOES))].sort();
    const slL=document.getElementById('fLoja');
    const slR=document.getElementById('fRegiao');
    lojas.forEach(l=>{const o=document.createElement('option');o.value=l;o.textContent=l;slL.appendChild(o);});
    grupos.forEach(g=>{const o=document.createElement('option');o.value=g;o.textContent=g;slR.appendChild(o);});
    document.getElementById('loading').style.display='none';
    document.getElementById('main-content').style.display='block';
    renderForecast();
  }catch(e){
    document.getElementById('loading').style.display='none';
    document.getElementById('error-box').style.display='block';
    document.getElementById('error-msg').textContent='Erro: '+e.message;
  }
}

function onVisaoChange(){
  const v=document.getElementById('fVisao').value;
  document.getElementById('grpRegiao').style.display=v==='regiao'?'flex':'none';
  document.getElementById('grpLoja').style.display=v==='loja'?'flex':'none';
  renderForecast();
}

// ── Render ──
function renderForecast(){
  const visao=document.getElementById('fVisao').value;
  const rows=filtrar(DADOS);

  // Meses com realizado em 2026
  const mesesReal=[...new Set(
    DADOS.filter(r=>r.mes_ano.startsWith('2026')&&r.linha_dre==='Receita Bruta'&&r.realizado/100!==0)
      .map(r=>r.mes_ano.slice(5,7))
  )].sort();

  // Meses orçados = meses sem realizado
  const mesesOrc=MESES_ANO.filter(m=>!mesesReal.includes(m));

  // Todos os meses do ano (para orçado original)
  const mesesTodos=MESES_ANO;

  const nReal=mesesReal.length, nOrc=mesesOrc.length;
  const lReal=nReal>0?`${NOM[parseInt(mesesReal[0])-1]}–${NOM[parseInt(mesesReal[nReal-1])-1]}`:'Real';
  const lOrc =nOrc>0?`${NOM[parseInt(mesesOrc[0])-1]}–${NOM[parseInt(mesesOrc[nOrc-1])-1]}`:'Orç';

  // Labels visão
  const visaoLabel=visao==='consolidado'?'Consolidado':
    visao==='regiao'?document.getElementById('fRegiao').value:
    document.getElementById('fLoja').value;

  document.getElementById('page-sub').textContent=`TerraZoo · ${visaoLabel} · ${nReal} meses realizados · ${nOrc} meses orçados`;
  document.getElementById('badge-periodo').textContent=`2026 · ${nReal} real + ${nOrc} orç`;

  // ── Calcular ──
  const calc={};
  LINHAS.forEach(item=>{
    const real=somaReal(rows,item.linha,mesesReal);
    const orc =somaOrc(rows,item.linha,mesesOrc);
    const orig=somaOrc(rows,item.linha,mesesTodos);
    calc[item.linha]={real, orc, total:real+orc, orig};
  });

  const rl=calc['Receita Líquida'];
  const rb=calc['Receita Bruta'];
  const mb=calc['Lucro Bruto Ajustado'];
  const eb=calc['EBITDA Ajustado'];

  // ── KPIs ──
  const ah_rb=fmtAH(rb.total,rb.orig);
  const ah_eb=fmtAH(eb.total,eb.orig);
  const sg=calc['SG&A'];
  const ah_sg=fmtAH(sg.total,sg.orig);
  document.getElementById('kpi-area').innerHTML=`
    <div class="kpi">
      <div class="kpi-label">Receita Bruta Forecast</div>
      <div class="kpi-value">${fmtM(rb.total)}</div>
      <div class="kpi-sub">Real ${fmtM(rb.real)} · Orç ${fmtM(rb.orc)}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Receita Líquida Forecast</div>
      <div class="kpi-value">${fmtM(rl.total)}</div>
      <div class="kpi-sub">AV% ${fmtAV(rl.total,rb.total)} da RB</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Margem Bruta Forecast</div>
      <div class="kpi-value">${fmtM(mb.total)}</div>
      <div class="kpi-sub kpi-${mb.total>=0?'up':'dn'}">${fmtAV(mb.total,rl.total)} da RL</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">SG&A Forecast</div>
      <div class="kpi-value">${fmtM(sg.total)}</div>
      <div class="kpi-sub kpi-${ah_sg.cls==='ah-pos'?'dn':'up'}">${ah_sg.txt} vs Orçado Original</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">EBITDA Ajustado Forecast</div>
      <div class="kpi-value">${fmtM(eb.total)}</div>
      <div class="kpi-sub kpi-${ah_eb.cls==='ah-pos'?'up':'dn'}">${ah_eb.txt} vs Orçado Original</div>
    </div>`;

  // ── Thead ──
  const thead=document.getElementById('thead-forecast');
  thead.innerHTML=`
    <colgroup>
      <col style="width:310px">
      <col style="width:90px"><col style="width:58px">
      <col style="width:90px"><col style="width:58px">
      <col style="width:90px"><col style="width:58px">
      <col style="width:90px"><col style="width:58px">
      <col style="width:72px">
    </colgroup>
    <tr class="gr1">
      <th class="th-dre" rowspan="2">Linha DRE</th>
      <th class="th-real" colspan="2">${lReal}/26 — Realizado</th>
      <th class="th-orc"  colspan="2">${lOrc}/26 — Orçado</th>
      <th class="th-total" colspan="2">Forecast Total 2026</th>
      <th class="th-orig" colspan="2">Orçado Original 2026</th>
      <th class="th-orig">AH%</th>
    </tr>
    <tr class="gr2">
      <th class="th-real">R$</th><th class="th-real">AV%</th>
      <th class="th-orc">R$</th><th class="th-orc">AV%</th>
      <th class="th-total">R$</th><th class="th-total">AV%</th>
      <th class="th-orig">R$</th><th class="th-orig">AV%</th>
      <th class="th-orig">Forecast vs Orç</th>
    </tr>`;

  // Bases AV%
  const rl_real =calc['Receita Líquida'].real  ||1;
  const rl_orc  =calc['Receita Líquida'].orc   ||1;
  const rl_total=calc['Receita Líquida'].total  ||1;
  const rl_orig =calc['Receita Líquida'].orig   ||1;

  // ── Tbody ──
  const tbody=document.getElementById('tbody-forecast');
  tbody.innerHTML=LINHAS.map(item=>{
    const v=calc[item.linha];
    const neg_r=v.real<0, neg_o=v.orc<0, neg_t=v.total<0, neg_g=v.orig<0;
    const av_r=fmtAV(v.real, rl_real);
    const av_o=fmtAV(v.orc,  rl_orc);
    const av_t=fmtAV(v.total,rl_total);
    const av_g=fmtAV(v.orig, rl_orig);
    const ah=fmtAH(v.total,v.orig);
    return `<tr class="${item.cls}">
      <td>${item.linha}</td>
      <td class="${neg_r?'neg':''}">${fmtN(v.real)}</td>
      <td class="av">${av_r}</td>
      <td class="${neg_o?'neg':''}">${fmtN(v.orc)}</td>
      <td class="av">${av_o}</td>
      <td class="${neg_t?'neg':''}">${fmtN(v.total)}</td>
      <td class="av">${av_t}</td>
      <td class="${neg_g?'neg':''}">${fmtN(v.orig)}</td>
      <td class="av">${av_g}</td>
      <td class="${ah.cls}">${ah.txt}</td>
    </tr>`;
  }).join('');

  // ── Segunda tabela: Forecast Ajustado por Tendência ──
  renderForecastAjustado(rows, mesesReal, mesesOrc);
}

function exportarCSV(){
  const rows=[...document.querySelectorAll('#tbody-forecast tr')];
  const hdr=[...document.querySelectorAll('#thead-forecast th')].map(t=>t.textContent.trim()).join(';');
  const lines=[hdr,...rows.map(tr=>[...tr.querySelectorAll('td')].map(td=>td.textContent.trim()).join(';'))];
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+lines.join('\n')],{type:'text/csv;charset=utf-8;'}));
  a.download=`TerraZoo_Forecast_2026_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ── Forecast Ajustado por Tendência ──
// Lógica: fator por linha = Real Jan-Abr ÷ Orç Jan-Abr
// Forecast Mai-Dez = Orç Mai-Dez × fator (por linha)
// Forecast Total   = Real Jan-Abr + Forecast Mai-Dez
// Orç Total        = Orç Jan-Abr  + Orç Mai-Dez
function renderForecastAjustado(rows, mesesReal, mesesOrc){
  const lReal = mesesReal.length>0 ? `${NOM[parseInt(mesesReal[0])-1]}–${NOM[parseInt(mesesReal[mesesReal.length-1])-1]}` : 'Real';
  const lOrc  = mesesOrc.length>0  ? `${NOM[parseInt(mesesOrc[0])-1]}–${NOM[parseInt(mesesOrc[mesesOrc.length-1])-1]}`  : 'Orç';

  // ── Thead ──
  const thead = document.getElementById('thead-ajustado');
  thead.innerHTML=`
    <colgroup>
      <col style="width:310px">
      <col style="width:90px">
      <col style="width:90px">
      <col style="width:72px">
      <col style="width:90px">
      <col style="width:90px">
      <col style="width:90px">
      <col style="width:90px">
      <col style="width:72px">
    </colgroup>
    <tr class="gr1">
      <th class="th-dre" rowspan="2">Linha DRE</th>
      <th class="th-real">Real ${lReal}/26</th>
      <th class="th-orc">Orç ${lReal}/26</th>
      <th class="th-orc">AH%</th>
      <th class="th-orc">Orç ${lOrc}/26</th>
      <th class="th-total">Forecast ${lOrc}/26</th>
      <th class="th-total">Forecast Total</th>
      <th class="th-orig">Orç Total 2026</th>
      <th class="th-orig">AH%</th>
    </tr>
    <tr class="gr2">
      <th class="th-real">R$</th>
      <th class="th-orc">R$</th>
      <th class="th-orc">real/orç</th>
      <th class="th-orc">R$</th>
      <th class="th-total">R$</th>
      <th class="th-total">R$</th>
      <th class="th-orig">R$</th>
      <th class="th-orig">fcst/orç</th>
    </tr>`;

  // ── Calcular todas as linhas ──
  const calcAdj = {};
  LINHAS.forEach(item => {
    const realP = somaReal(rows, item.linha, mesesReal);
    const orcP  = somaOrc (rows, item.linha, mesesReal);
    const orcF  = somaOrc (rows, item.linha, mesesOrc);
    const fator = (orcP !== 0) ? realP / orcP : 1;
    const fcstF  = orcF * fator;
    const fcstTot= realP + fcstF;
    const orcTot = orcP  + orcF;
    calcAdj[item.linha] = { realP, orcP, orcF, fator, fcstF, fcstTot, orcTot };
  });

  // ── KPIs ──
  const aRB  = calcAdj['Receita Bruta'];
  const aRL  = calcAdj['Receita Líquida'];
  const aMB  = calcAdj['Lucro Bruto Ajustado'];
  const aSGA = calcAdj['SG&A'];
  const aEB  = calcAdj['EBITDA Ajustado'];

  const ah_rb_adj  = fmtAH(aRB.fcstTot,  aRB.orcTot);
  const ah_eb_adj  = fmtAH(aEB.fcstTot,  aEB.orcTot);
  const ah_sga_adj = fmtAH(aSGA.fcstTot, aSGA.orcTot);

  document.getElementById('kpi-ajustado').innerHTML=`
    <div class="kpi">
      <div class="kpi-label">Receita Bruta — Fcst Ajustado</div>
      <div class="kpi-value">${fmtM(aRB.fcstTot)}</div>
      <div class="kpi-sub kpi-${ah_rb_adj.cls==='ah-pos'?'up':'dn'}">${ah_rb_adj.txt} vs Orç Total</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Receita Líquida — Fcst Ajustado</div>
      <div class="kpi-value">${fmtM(aRL.fcstTot)}</div>
      <div class="kpi-sub">AV% ${fmtAV(aRL.fcstTot, aRB.fcstTot)} da RB</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Margem Bruta Ajustada — Fcst</div>
      <div class="kpi-value">${fmtM(aMB.fcstTot)}</div>
      <div class="kpi-sub kpi-${aMB.fcstTot>=0?'up':'dn'}">${fmtAV(aMB.fcstTot, aRL.fcstTot)} da RL</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">SG&A — Fcst Ajustado</div>
      <div class="kpi-value">${fmtM(aSGA.fcstTot)}</div>
      <div class="kpi-sub kpi-${ah_sga_adj.cls==='ah-pos'?'dn':'up'}">${ah_sga_adj.txt} vs Orç Total</div>
    </div>
    <div class="kpi" style="grid-column:span 1">
      <div class="kpi-label">EBITDA Ajustado — Fcst</div>
      <div class="kpi-value">${fmtM(aEB.fcstTot)}</div>
      <div class="kpi-sub kpi-${ah_eb_adj.cls==='ah-pos'?'up':'dn'}">${ah_eb_adj.txt} vs Orç Total</div>
    </div>`;

  const rl_realP  = calcAdj['Receita Líquida'].realP || 1;
  const rl_orcP   = calcAdj['Receita Líquida'].orcP  || 1;
  const rl_orcF   = calcAdj['Receita Líquida'].orcF  || 1;
  const rl_fcstTot= calcAdj['Receita Líquida'].fcstTot|| 1;
  const rl_orcTot = calcAdj['Receita Líquida'].orcTot || 1;

  const tbody = document.getElementById('tbody-ajustado');
  tbody.innerHTML = LINHAS.map(item=>{
    const v = calcAdj[item.linha];
    const {realP, orcP, orcF, fcstF, fcstTot, orcTot} = v;

    const ah1 = fmtAH(realP,   orcP);
    const ah2 = fmtAH(fcstTot, orcTot);
    const neg = (x) => x < 0 ? 'neg' : '';

    return `<tr class="${item.cls}">
      <td>${item.linha}</td>
      <td class="${neg(realP)}">${fmtN(realP)}</td>
      <td class="${neg(orcP)}">${fmtN(orcP)}</td>
      <td class="${ah1.cls}">${ah1.txt}</td>
      <td class="${neg(orcF)}">${fmtN(orcF)}</td>
      <td class="${neg(fcstF)}">${fmtN(fcstF)}</td>
      <td class="${neg(fcstTot)}">${fmtN(fcstTot)}</td>
      <td class="${neg(orcTot)}">${fmtN(orcTot)}</td>
      <td class="${ah2.cls}">${ah2.txt}</td>
    </tr>`;
  }).join('');
}

init();
</script>

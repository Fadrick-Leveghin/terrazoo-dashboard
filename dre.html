<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TerraZoo — DRE Gerencial</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Calibri:wght@300;400;600&display=swap');
:root {
  --v1:#1a2e1f; --v2:#2E7D32; --v3:#4CAF50; --v4:#A5D6A7; --v5:#b2dfc4; --v6:#E8F5E9;
  --txt:#111; --muted:#555; --borda:#C8E6C9; --fundo:#fff;
  /* DRE row colors */
  --row-total:#1a2e1f; --row-total-txt:#fff;
  --row-subtotal:#2E7D32; --row-subtotal-txt:#fff;
  --row-grupo:#E8F5E9; --row-grupo-txt:#1a2e1f;
  --row-conta:#fff; --row-conta-txt:#333;
  --row-highlight:#b2dfc4; --row-highlight-txt:#1a2e1f;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Calibri','Segoe UI',sans-serif;background:var(--fundo);color:var(--txt);min-height:100vh;font-size:13px}

/* HEADER */
header{background:var(--v1);height:64px;padding:0 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.logo{font-size:22px;font-weight:600;color:#fff}.logo span{color:var(--v4)}
.header-right{display:flex;align-items:center;gap:12px}
.btn-back{font-size:12px;color:var(--v4);background:none;border:1px solid rgba(165,214,167,.3);padding:5px 12px;border-radius:6px;cursor:pointer;font-family:inherit;text-decoration:none;transition:all .2s}
.btn-back:hover{background:rgba(165,214,167,.1)}
.btn-export{font-size:12px;color:#fff;background:var(--v2);border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-family:inherit;font-weight:600;transition:background .2s}
.btn-export:hover{background:var(--v3);color:var(--v1)}

/* LOADING */
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px}
.spinner{width:36px;height:36px;border:3px solid var(--borda);border-top-color:var(--v2);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ERROR */
#error-box{display:none;max-width:500px;margin:80px auto;padding:32px;background:#fff3f3;border:1px solid #ffcdd2;border-radius:12px;text-align:center}
.error-title{font-size:18px;font-weight:600;color:#c62828;margin-bottom:8px}
.error-msg{font-size:13px;color:#666;line-height:1.6}

/* MAIN */
main{max-width:1400px;margin:0 auto;padding:24px 20px 60px}

/* FILTROS */
.filtros-bar{background:#fff;border:1px solid var(--borda);border-radius:10px;padding:14px 20px;margin-bottom:20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.filtro-group{display:flex;align-items:center;gap:8px}
.filtro-label{font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);white-space:nowrap}
select,input[type=range]{background:var(--v6);border:1px solid var(--borda);color:var(--txt);font-size:12px;padding:6px 10px;border-radius:7px;font-family:inherit;cursor:pointer;transition:border-color .2s}
select:focus{outline:none;border-color:var(--v3)}
.filtro-sep{width:1px;height:28px;background:var(--borda)}

/* PAGE TITLE */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.page-title{font-size:22px;font-weight:600;color:var(--v1)}
.page-sub{font-size:12px;color:var(--muted);margin-top:3px}
.periodo-badge{background:var(--v5);color:var(--v1);font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;letter-spacing:.5px;white-space:nowrap}

/* DRE TABLE WRAPPER */
.dre-wrap{overflow-x:auto;border:1px solid var(--borda);border-radius:10px;background:#fff}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:900px}

/* HEADER ROW */
thead tr:first-child th{background:var(--v1);color:#fff;font-weight:600;font-size:11px;letter-spacing:.8px;text-transform:uppercase;padding:10px 8px;border-right:1px solid rgba(255,255,255,.1)}
thead tr:last-child th{background:#263a2b;color:rgba(255,255,255,.75);font-size:10px;font-weight:500;padding:6px 8px;border-right:1px solid rgba(255,255,255,.08);white-space:nowrap}
thead tr:first-child th:first-child{text-align:left;padding-left:14px;min-width:220px}
thead tr:last-child th:first-child{text-align:left;padding-left:14px}

/* TRACEJADO 2026 */
.col-2026{border-left:2px dashed rgba(76,175,80,.5)!important}
.col-2026-end{border-right:2px dashed rgba(76,175,80,.5)!important}

/* TBODY */
tbody tr{border-bottom:1px solid #f0f5f0;transition:filter .1s}
tbody tr:hover{filter:brightness(.96)}

/* ROW TYPES */
tr.row-total td{background:var(--row-total);color:var(--row-total-txt);font-weight:700;font-size:12px}
tr.row-total td:first-child{padding-left:12px}
tr.row-receita-liq td{background:#1B5E20;color:#fff;font-weight:700}
tr.row-subtotal td{background:var(--row-subtotal);color:var(--row-subtotal-txt);font-weight:600}
tr.row-highlight td{background:var(--row-highlight);color:var(--row-highlight-txt);font-weight:600}
tr.row-grupo td{background:var(--row-grupo);color:var(--row-grupo-txt);font-weight:500}
tr.row-conta td{background:var(--row-conta);color:var(--row-conta-txt)}

td{padding:5px 8px;text-align:right;white-space:nowrap;border-right:1px solid #f0f5f0}
td:first-child{text-align:left;padding-left:14px;border-right:1px solid #e0ebe0;min-width:220px}
td.indent-1{padding-left:26px}
td.indent-2{padding-left:38px}
td.pct-neg{color:#c62828!important}
td.pct-pos{color:#2E7D32!important}
td.ah-neg{color:#c62828!important;font-weight:600}
td.ah-pos{color:#4CAF50!important;font-weight:600}
td.zero{color:#aaa!important}

/* AH% em linhas coloridas — sempre branco */
tr.row-total td.ah-neg, tr.row-total td.ah-pos, tr.row-total td.zero,
tr.row-subtotal td.ah-neg, tr.row-subtotal td.ah-pos, tr.row-subtotal td.zero,
tr.row-highlight td.ah-neg, tr.row-highlight td.ah-pos,
tr.row-receita-liq td.ah-neg, tr.row-receita-liq td.ah-pos,
tr.row-grupo td.ah-neg, tr.row-grupo td.ah-pos { color:#fff!important }
tr.row-highlight td.ah-neg, tr.row-highlight td.ah-pos { color:var(--v1)!important }

/* COLLAPSE TOGGLE */
.toggle-btn{
  display:inline-flex;align-items:center;justify-content:center;
  width:16px;height:16px;border-radius:3px;border:1px solid currentColor;
  font-size:11px;font-weight:700;line-height:1;cursor:pointer;
  margin-right:6px;flex-shrink:0;opacity:.7;
  background:rgba(255,255,255,.15);transition:opacity .15s;
  vertical-align:middle;
}
.toggle-btn:hover{opacity:1}
tr.row-collapsed{display:none}

/* FOOTER */
footer{background:var(--v1);padding:16px 32px;display:flex;align-items:center;justify-content:space-between}
.footer-logo{font-size:13px;font-weight:600;color:rgba(255,255,255,.4)}.footer-logo span{color:var(--v4)}
.footer-info{font-size:11px;color:rgba(255,255,255,.25);letter-spacing:1px}
</style>
</head>
<body>
<header>
  <div class="logo">terra<span>ZOO</span></div>
  <div class="header-right">
    <span style="font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.4)">DRE Gerencial</span>
    <button class="btn-export" onclick="exportarDRE()">⬇ Exportar CSV</button>
    <a class="btn-back" href="index.html">← Voltar</a>
  </div>
</header>

<div id="loading"><div class="spinner"></div><div style="font-size:14px;color:var(--muted)">Carregando dados...</div></div>
<div id="error-box"><div class="error-title">Erro de conexão</div><div class="error-msg" id="error-msg"></div></div>

<main id="main-content" style="display:none">

  <!-- Filtros -->
  <div class="filtros-bar">
    <div class="filtro-group">
      <span class="filtro-label">Período</span>
      <select id="fPeriodo" onchange="onFiltroChange()">
        <option value="mensal">Mensal</option>
        <option value="acumulado">Acumulado</option>
      </select>
    </div>
    <div class="filtro-group">
      <span class="filtro-label">Mês</span>
      <select id="fMes" onchange="onFiltroChange()"></select>
    </div>
    <div class="filtro-sep"></div>
    <div class="filtro-group">
      <span class="filtro-label">Visão</span>
      <select id="fVisao" onchange="onVisaoChange()">
        <option value="consolidado">Consolidado</option>
        <option value="regiao">Por Região</option>
        <option value="loja">Por Loja</option>
      </select>
    </div>
    <div class="filtro-group" id="grpRegiao" style="display:none">
      <span class="filtro-label">Região</span>
      <select id="fRegiao" onchange="onFiltroChange()"></select>
    </div>
    <div class="filtro-group" id="grpLoja" style="display:none">
      <span class="filtro-label">Loja</span>
      <select id="fLoja" onchange="onFiltroChange()"></select>
    </div>
  </div>

  <!-- Header da DRE -->
  <div class="page-header">
    <div>
      <div class="page-title" id="dreTitle">DRE Gerencial</div>
      <div class="page-sub" id="dreSub"></div>
    </div>
    <div class="periodo-badge" id="periodoLabel"></div>
  </div>

  <!-- Tabela DRE -->
  <div class="dre-wrap">
    <table id="dreTable">
      <thead id="dreHead"></thead>
      <tbody id="dreBody"></tbody>
    </table>
  </div>

</main>

<footer>
  <div class="footer-logo">terra<span>ZOO</span></div>
  <div class="footer-info">DRE GERENCIAL · TERRAZOO</div>
</footer>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbwbqZDvHDwuwWJkyyjgK3YJAi7JEBqLHAlbuJHh32V50FyFSTneJEmmRWrpW49Rw5by/exec?tipo=dre';

const REGIOES = {};
let DADOS = [];
let LOJAS = [];
let DRE_ORDEM = []; // ordem e hierarquia vindas do banco
const NOM_MES = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

// Linhas que recebem cor especial independente do nivel
const LINHAS_ESPECIAIS = {
  'Receita Líquida':      'row-receita-liq',
  'Lucro Bruto':          'row-highlight',
  'Lucro Bruto Ajustado': 'row-highlight',
  'EBITDA':               'row-total',
  'EBITDA Ajustado':      'row-total',
};

// Linhas de despesa — positivo = ruim
const LINHAS_DESPESA = new Set([
  'SG&A','CMV & CSP','Impostos S/ Vendas','Aluguel',
  'Gastos com Pessoal - SG&A','Despesas Comerciais',
  'Despesas com Distribuição','Despesas Administrativas',
  'Despesas Tributárias','PIS','ICMS','COFINS',
  'Custo das Mercadorias Vendidas','Custo dos Serviços Prestados',
]);

// Mapeamento nivel → classe CSS
const NIVEL_CLASSE = {
  total:   'row-total',
  grupo:   'row-subtotal',
  conta:   'row-conta',
};

// Indentação por nivel
const NIVEL_INDENT = {
  total:  '',
  grupo:  'indent-1',
  conta:  'indent-2',
};

async function init() {
  try {
    const resp = await fetch(API_URL);
    const data = await resp.json();
    if (data.status !== 'ok') throw new Error(data.message);

    // Parsear dados
    DADOS = data.rows.map(r => ({
      mes_ano:   String(r.mes_ano||'').replace(/[^0-9\-]/g,'').slice(0,7),
      loja:      String(r.loja||''),
      cod_conta: parseInt(String(r.cod_conta||'0')) || 0,
      linha_dre: String(r.linha_dre||'').trim(),
      nivel:     String(r.nivel||'grupo'),
      realizado: (Number(r.realizado||0)) / 100,
      orcado:    (Number(r.orcado||0))    / 100,
    }));

    // Construir ordem da DRE a partir dos cod_conta únicos (ordenados)
    const linhasUnicas = new Map();
    DADOS.forEach(r => {
      if (!linhasUnicas.has(r.cod_conta)) {
        linhasUnicas.set(r.cod_conta, { linha: r.linha_dre, nivel: r.nivel, cod: r.cod_conta });
      }
    });
    DRE_ORDEM = [...linhasUnicas.values()].sort((a,b) => a.cod - b.cod);

    // Regiões
    Object.assign(REGIOES, data.regioes || {});
    LOJAS = [...new Set(DADOS.map(r=>r.loja))].sort();

    // Popular filtros
    popularFiltros();

    document.getElementById('loading').style.display='none';
    document.getElementById('main-content').style.display='block';
    renderDRE();
  } catch(e) {
    document.getElementById('loading').style.display='none';
    document.getElementById('error-box').style.display='block';
    document.getElementById('error-msg').textContent='Erro: '+e.message;
  }
}

function popularFiltros() {
  // Só meses com realizado em 2026 (Receita Bruta como referência)
  const meses = [...new Set(
    DADOS
      .filter(r => r.mes_ano.startsWith('2026') &&
                   r.linha_dre === 'Receita Bruta' &&
                   Number(r.realizado) !== 0)
      .map(r => r.mes_ano.slice(5,7))
      .filter(m => m && m.match(/^\d{2}$/))
  )].sort();

  const sel = document.getElementById('fMes');
  sel.innerHTML = '';
  meses.forEach(m => {
    const o = document.createElement('option');
    o.value=m; o.textContent=NOM_MES[parseInt(m)-1];
    sel.appendChild(o);
  });
  if (meses.length) sel.value = meses[meses.length-1];

  // Regiões
  const gruposUnicos = [...new Set(Object.values(REGIOES))].sort();
  const selR = document.getElementById('fRegiao');
  gruposUnicos.forEach(g => { const o=document.createElement('option'); o.value=g; o.textContent=g; selR.appendChild(o); });

  // Lojas
  const selL = document.getElementById('fLoja');
  LOJAS.forEach(l => { const o=document.createElement('option'); o.value=l; o.textContent=l; selL.appendChild(o); });
}

function onVisaoChange() {
  const v = document.getElementById('fVisao').value;
  document.getElementById('grpRegiao').style.display = v==='regiao' ? 'flex' : 'none';
  document.getElementById('grpLoja').style.display   = v==='loja'   ? 'flex' : 'none';
  renderDRE();
}

function onFiltroChange() { renderDRE(); }

function getDados(ano, meses_list) {
  return DADOS.filter(r =>
    r.mes_ano.startsWith(ano) &&
    meses_list.includes(r.mes_ano.slice(5,7))
  );
}

function filtrarVisao(rows) {
  const visao = document.getElementById('fVisao').value;
  if (visao === 'regiao') {
    const reg = document.getElementById('fRegiao').value;
    return rows.filter(r => REGIOES[r.loja] === reg);
  }
  if (visao === 'loja') {
    const lj = document.getElementById('fLoja').value;
    return rows.filter(r => r.loja === lj);
  }
  return rows; // consolidado
}

function somaLinha(rows, linha) {
  const r = rows.filter(r=>r.linha_dre===linha);
  return {
    realizado: r.reduce((s,x)=>s+x.realizado,0),
    orcado:    r.reduce((s,x)=>s+x.orcado,0),
  };
}

function fmt(v) {
  if (v===0) return '-';
  const abs = Math.abs(v);
  const s = Math.round(Math.abs(v)).toLocaleString('pt-BR');
  return v<0?`(${s})`:s;
}
function fmtPct(v) {
  if (!isFinite(v)||isNaN(v)) return '-';
  return (v*100).toFixed(1).replace('.',',')+'%';
}
function fmtAH(v) {
  if (!isFinite(v)||isNaN(v)) return '-';
  const p=(v*100).toFixed(1).replace('.',',');
  return (v>=0?'+':'')+p+'%';
}
function pctClass(v, inverted=false) {
  if (!isFinite(v)||isNaN(v)||v===0) return 'zero';
  const pos = inverted ? v<0 : v>0;
  return pos?'ah-pos':'ah-neg';
}

function renderDRE() {
  const periodo  = document.getElementById('fPeriodo').value;
  const mes      = document.getElementById('fMes').value;
  const visao    = document.getElementById('fVisao').value;
  const mesIdx   = parseInt(mes)-1;
  const mesLabel = NOM_MES[mesIdx];

  // Meses com realizado em 2026
  const mesesComReal = [...new Set(
    DADOS.filter(r => r.mes_ano.startsWith('2026') &&
                      r.linha_dre === 'Receita Bruta' &&
                      Number(r.realizado) !== 0)
      .map(r => r.mes_ano.slice(5,7))
  )].sort();

  // Meses para o período selecionado
  const meses26 = periodo === 'acumulado'
    ? mesesComReal.filter(m => m <= mes)
    : (mesesComReal.includes(mes) ? [mes] : []);
  const meses25 = meses26;

  const raw26 = filtrarVisao(getDados('2026', meses26));
  const raw25 = filtrarVisao(getDados('2025', meses25));

  // Labels
  const periLabel = periodo==='acumulado' ? `Acumulado Jan–${mesLabel}/26` : `${mesLabel}/2026`;
  const visaoLabel = visao==='consolidado' ? 'Consolidado'
    : visao==='regiao' ? document.getElementById('fRegiao').value
    : document.getElementById('fLoja').value;

  document.getElementById('dreTitle').textContent = `DRE Gerencial — ${visaoLabel}`;
  document.getElementById('dreSub').textContent   = `TerraZoo · ${periLabel}`;
  document.getElementById('periodoLabel').textContent = periLabel;

  // RL para AV%
  const rl26 = somaLinha(raw26, 'Receita Líquida');
  const rl25 = somaLinha(raw25, 'Receita Líquida');
  const rl26_orc = rl26.orcado;
  const rl25_r   = rl25.realizado;
  const rl26_r   = rl26.realizado;

  // HEADER
  const thead = document.getElementById('dreHead');
  thead.innerHTML = `
  <tr>
    <th rowspan="2" style="text-align:left;padding-left:14px;min-width:220px">DRE</th>
    <th colspan="3" class="col-2026" style="text-align:center;border-bottom:1px solid rgba(255,255,255,.2)">Real 2026</th>
    <th colspan="2" style="text-align:center;border-bottom:1px solid rgba(255,255,255,.2)">Orçado 2026</th>
    <th style="text-align:center;border-bottom:1px solid rgba(255,255,255,.2)">AH%</th>
    <th colspan="3" style="text-align:center;border-bottom:1px solid rgba(255,255,255,.2)">Real 2025</th>
    <th style="text-align:center">AH%</th>
  </tr>
  <tr>
    <th class="col-2026">R$</th>
    <th>AV%</th>
    <th class="col-2026-end">Part%</th>
    <th>R$</th>
    <th>AV%</th>
    <th>vs Orç</th>
    <th>R$</th>
    <th>AV%</th>
    <th>Part%</th>
    <th>vs 2025</th>
  </tr>`;

  // BODY
  const tbody = document.getElementById('dreBody');
  tbody.innerHTML = '';

  // Total RB para Part%
  const rb26 = somaLinha(raw26,'Receita Bruta').realizado;
  const rb25 = somaLinha(raw25,'Receita Bruta').realizado;

  // Mapa explícito de hierarquia: pai → lista de cod_conta dos filhos
  // Baseado na estrutura real do banco (cod_conta)
  const HIERARQUIA = {
    // Receita com Revenda de Mercadorias (100100) → filhos: 100101, 100103+
    100100: r => r.cod >= 100101 && r.cod < 100400,
    // Receita com Serviços (100400) → filhos: 100405+
    100400: r => r.cod >= 100405 && r.cod < 100500,
    // Ajuste Intercompany (100500) → filhos: 100512+
    100500: r => r.cod >= 100501 && r.cod < 200000,
    // Impostos S/Vendas (200000) → agrupa PIS, COFINS, ICMS, ISS, Ajuste Tributos
    200000: r => r.cod >= 204000 && r.cod < 300000,
    // CMV & CSP (400000) → Custo Merc, Ajuste Custo, Custo Serviços
    400000: r => r.cod >= 414000 && r.cod < 500000,
    // Demais Operações (600000) → Verbas Comerciais
    600000: r => r.cod >= 617000 && r.cod < 700000,
    // Comissões sobre Vendas (1018000) → 1018050, 1018051
    1018000: r => r.cod >= 1018050 && r.cod < 1019000,
    // Gastos com Pessoal Comercial (1019000) → contas 1019xxx
    1019000: r => r.cod >= 1019001 && r.cod < 1020000,
    // Gastos com Pessoal SGA (1020000) → contas 1020xxx
    1020000: r => r.cod >= 1020073 && r.cod < 1021000,
    // Despesas Comerciais (1021000)
    1021000: r => r.cod >= 1021096 && r.cod < 1022000,
    // Despesas com Distribuição (1022000)
    1022000: r => r.cod >= 1022145 && r.cod < 1023000,
    // Despesas Administrativas (1023000)
    1023000: r => r.cod >= 1023158 && r.cod < 1024000,
    // Despesas Tributárias (1024000)
    1024000: r => r.cod >= 1024198 && r.cod < 1025000,
    // Aluguel (1025000) — múltiplas contas em lojas diferentes
    1025000: r => r.cod >= 1025001 && r.cod < 1026000,
    // Outras Receitas/Despesas Operacionais (1100000) → subgrupos + contas
    1100000: r => r.cod >= 1126000 && r.cod < 1200000,
    // Resultados Não Recorrentes (1300000)
    1300000: r => r.cod >= 1302000 && r.cod < 1400000,
    // D&A (1600000)
    1600000: r => r.cod >= 1628000 && r.cod < 1700000,
    // Despesas Pré Operacionais (1700000) → vai até EBIT
    1700000: r => r.cod >= 1732000 && r.cod < 1800000,
    // Receitas/Despesas Financeiras (1900000)
    1900000: r => r.cod >= 1929000 && r.cod < 2100000,
    // Despesas Financeiras (1929000)
    1929000: r => r.cod >= 1929251 && r.cod < 1930000,
    // Receitas Financeiras (1930000)
    1930000: r => r.cod >= 1930291 && r.cod < 2000000,
  };

  // Construir lookup: cod_conta → grupoId
  const codToGrupo = {};
  const grupoHasChildren = {};
  Object.keys(HIERARQUIA).forEach(paiCod => {
    const gId = `grp-${paiCod}`;
    let count = 0;
    DRE_ORDEM.forEach(item => {
      if (HIERARQUIA[paiCod]({cod: item.cod})) {
        codToGrupo[item.cod] = gId;
        count++;
      }
    });
    grupoHasChildren[paiCod] = count >= 1;
  });

  DRE_ORDEM.forEach(item => {
    const v26 = somaLinha(raw26, item.linha);
    const v25 = somaLinha(raw25, item.linha);
    const r26 = v26.realizado, o26 = v26.orcado, r25 = v25.realizado;

    if (r26===0 && o26===0 && r25===0) return;

    const base26 = rl26_r || 1;
    const base25 = rl25_r || 1;
    const baseO  = rl26_orc || 1;
    const av26   = r26/base26;
    const avo26  = o26/baseO;
    const av25   = r25/base25;
    const part26 = rb26 ? r26/rb26 : 0;
    const part25 = rb25 ? r25/rb25 : 0;
    const ah_orc = o26 ? (r26-o26)/Math.abs(o26) : null;
    const ah_aa  = r25 ? (r26-r25)/Math.abs(r25) : null;
    const isDespesa = LINHAS_DESPESA.has(item.linha);

    const tr = document.createElement('tr');
    let cls = LINHAS_ESPECIAIS[item.linha] || NIVEL_CLASSE[item.nivel] || 'row-conta';
    if (item.nivel==='grupo' && item.cod < 300000) cls='row-subtotal';
    tr.className = cls;

    const indent = NIVEL_INDENT[item.nivel] || '';
    const ahOrcClass = ah_orc!==null ? pctClass(ah_orc, isDespesa) : 'zero';
    const ahAAClass  = ah_aa!==null  ? pctClass(ah_aa,  isDespesa) : 'zero';

    let nomeExibido = item.linha;
    if (item.nivel==='conta' && item.linha.includes('-')) {
      nomeExibido = item.linha.split('-').slice(1).join('-').trim();
    }

    // Determina se é pai e se tem filhos suficientes
    const isPai    = HIERARQUIA.hasOwnProperty(item.cod);
    const isFilho  = codToGrupo.hasOwnProperty(item.cod);
    const temFilhos = isPai && grupoHasChildren[item.cod];

    // Atribui grupo para colapso
    if (isFilho) tr.dataset.grupo = codToGrupo[item.cod];

    // Botão toggle só em pais com múltiplos filhos
    const gId = `grp-${item.cod}`;
    const toggleHtml = temFilhos
      ? `<span class="toggle-btn" onclick="toggleGrupo('${gId}', this)">−</span>`
      : '';

    tr.innerHTML = `
      <td class="${indent}" title="${item.linha}">${toggleHtml}${nomeExibido}</td>
      <td class="col-2026">${fmt(r26)}</td>
      <td>${fmtPct(av26)}</td>
      <td class="col-2026-end">${fmtPct(part26)}</td>
      <td>${fmt(o26)}</td>
      <td>${fmtPct(avo26)}</td>
      <td class="${ahOrcClass}">${ah_orc!==null?fmtAH(ah_orc):'-'}</td>
      <td>${fmt(r25)}</td>
      <td>${fmtPct(av25)}</td>
      <td>${fmtPct(part25)}</td>
      <td class="${ahAAClass}">${ah_aa!==null?fmtAH(ah_aa):'-'}</td>`;
    tbody.appendChild(tr);
  });
}

// Toggle colapso/expansão
function toggleGrupo(grupoId, btn) {
  const rows = document.querySelectorAll(`tr[data-grupo="${grupoId}"]`);
  const collapsed = btn.textContent === '+';
  rows.forEach(r => r.classList.toggle('row-collapsed', !collapsed));
  btn.textContent = collapsed ? '−' : '+';
}

// Export CSV
function exportarDRE() {
  const rows = document.querySelectorAll('#dreBody tr');
  const head = 'Linha;Real 2026;AV%;Part%;Orçado 2026;AV% Orç;AH vs Orç;Real 2025;AV% 2025;Part% 2025;AH vs 2025';
  const lines = [head];
  rows.forEach(tr => {
    const cells = [...tr.querySelectorAll('td')].map(td=>td.textContent.trim());
    lines.push(cells.join(';'));
  });
  const csv = '\uFEFF'+lines.join('\n');
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`TerraZoo_DRE_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

init();
</script>
